{{ define "main" }}
<section class="single-page">
    <div class="page-container">
        {{ if .Params.status }}
        <span class="page-meta">{{ .Params.status }}</span>
        {{ end }}
        <h1 class="page-title">{{ .Title }}</h1>
        <div class="page-content">
            {{ .Content }}
        </div>
    </div>
</section>

<style>
.single-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2rem;
}

.page-meta {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-secondary);
    background: rgba(255, 0, 107, 0.1);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
}

.page-title {
    font-size: 2.5rem;
    font-weight: 800;
    margin: 1rem 0 2rem;
    color: var(--accent-primary);
}

.page-content {
    color: var(--text-secondary);
    line-height: 1.8;
    font-size: 1rem;
}

.page-content h2 {
    color: var(--text-primary);
    margin-top: 2rem;
    margin-bottom: 1rem;
    font-size: 1.5rem;
}

.page-content h3 {
    color: var(--accent-tertiary);
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    font-size: 1.2rem;
}

.page-content p {
    margin-bottom: 1rem;
}

.page-content a {
    color: var(--accent-primary);
    text-decoration: none;
    font-weight: 600;
}

.page-content a:hover {
    text-decoration: underline;
}

.page-content code {
    background: var(--bg-secondary);
    color: var(--accent-primary);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-family: "Fira Code", monospace;
    font-size: 0.9em;
}

.page-content pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    margin: 1.5rem 0;
}

.page-content pre code {
    background: none;
    color: var(--accent-primary);
    padding: 0;
}

.page-content ul, .page-content ol {
    margin-left: 1.5rem;
    margin-bottom: 1rem;
}

.page-content li {
    margin-bottom: 0.5rem;
}

.page-content blockquote {
    border-left: 4px solid var(--accent-primary);
    padding-left: 1rem;
    margin: 1.5rem 0;
    color: var(--text-secondary);
    font-style: italic;
}

.page-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
}

.page-content th, .page-content td {
    padding: 0.75rem;
    text-align: left;
    border-bottom: 1px solid var(--border-color);
}

.page-content th {
    background: var(--bg-secondary);
    color: var(--accent-primary);
    font-weight: 600;
}
</style>
{{ end }}
