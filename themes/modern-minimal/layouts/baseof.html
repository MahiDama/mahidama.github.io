<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-symbol">▲</span>
            </a>
            <ul class="nav-menu">
                <li><a href="/#projects" class="nav-link">Projects</a></li>
                <li><a href="/#about" class="nav-link">About</a></li>
                <li><a href="/mentorship" class="nav-link">Mentorship</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 Product Strategist & Builder. Open source enthusiast.</p>
            <div class="social-links">
                <a href="https://github.com/{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
                <a href="https://linkedin.com/in/{{ .Site.Params.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
